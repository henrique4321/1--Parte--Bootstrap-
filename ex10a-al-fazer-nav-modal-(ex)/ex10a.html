<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Navbar</a>
    
        <!-- Exemplo de Modal -->
     <div class="container mt-3">

        <!-- Botão para acionar (Modal) -->
         <div class="modal fade" id="exemploModal">
            <div class="modal-dialog position-fixed top-0 start-50 translate-middle-x mt-3"></div>

                <!-- caixa modal -->
                <div class="modal-content mx-auto">

                    <!-- header -->
                    <div class="modal-header">
                    <h5 class="modal-title">Entre em contato</h5>
                    <button class="btn-close" type="button" data-bs-dismiss="modal"></button>
                </div>

                <!-- Conteúdo interno -->
                 <div class="modal-body">

  <div class="mb-3">
    <label class="form-label">Email</label>
    <input type="email" class="form-control">
  </div>

  <div class="mb-3">
    <label class="form-label">Nome</label>
    <input type="text" class="form-control">
  </div>

  <div class="mb-3">
    <label class="form-label">Mensagem</label>
    <textarea class="form-control" rows="5  "></textarea>
  </div>

</div>

                 <!-- footer, rodape (modal) -->
                  <div class="modal-footer">
                    <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Fechar</button>
                    <button class="btn btn-primary" type="button">Salvar</button>
                  </div>
            </div>
                </div>
         </div>
        <button class="btn btn-success" type="button" data-bs-toggle="modal" data-bs-target="#exemploModal">
            Contato
        </button>
     </div>

     
</nav>
    

 


<script>
    (function () {
        'use strict'
        var forms = document.querySelectorAll('.needs-validation')
        Array.prototype.slice.call(forms).forEach(function (form) {
            form.addEventListener('submit', function (event) {
                if (!form.checkValidity()) {
                    event.preventDefault()
                    event.stopPropagation()
                }
                form.classList.add('was-validated')
            }, false)
        })
    })()
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
