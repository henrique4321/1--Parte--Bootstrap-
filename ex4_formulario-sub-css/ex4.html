<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Bootstrap Customizado</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap ícones -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <!-- CSS customizado -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!--Formulários-->
   <div class="container mt-3">
        <form class="custom-form">
            <div class="col-sm-6 mb-3">
                <label for="email" class="form-label">E-mail</label>
                <input type="email" class="form-control custom-input" id="email">

            </div>
            <div class="col-sm-6">
                <div class="input-group">
                    <span class="input-group-text custom-icon">
                        <i class="bi bi-person">
                        </i>
                    </span>
                    <input type="text" class="form-control custom-input" placeholder="Nome de Usuário...">
                </div>
            </div>
            <!--SENHA-->
            <div class="col-sm-6">
                <label for="password" class="form-label">e-mail</label>
                <input type="password" class="form-control custom-input" id="senha">
            </div>
            <!--botão de envio-->
            <button type="submit" class="btn btn-primary custom-buttom mt-3">Enviar</button>
            <button type="submit" class="btn btn-primary mt-3">Navegar</button>
        </form>
   </div>
     

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
