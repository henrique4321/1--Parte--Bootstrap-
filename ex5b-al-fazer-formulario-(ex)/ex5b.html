<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Bootstrap</title>
<link rel="stylesheet" href="styles.css">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap ícones -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
<body class="bg-dark d-flex justify-content-center align-items-center vh-100">

<form class="custom-form p-4">

    <img src="logosenai.png" class="mb-3 d-block mx-auto" style="width: 350px;">

    <h1 class="mb-2 text-center text-light">Login</h1>

    <div class="mb-3">
        <label for="email" class="form-label text-light">E-mail</label>
        <div class="input-group">
            <span class="input-group-text custom-icon">
                <i class="bi bi-person"></i>
            </span>
            <input type="email" class="form-control" id="email" required>
        </div>
    </div>

    <div class="mb-3">
        <label for="senha" class="form-label text-light">Senha</label>
        <div class="input-group">
            <span class="input-group-text custom-icon">
                <i class="bi bi-key-fill"></i>
            </span>
            <input type="password" class="form-control" id="senha" required>
        </div>
    </div>

    <button type="submit" class="btn btn-primary w-100">Enviar</button>

</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const form = document.querySelector('form');

    form.addEventListener('submit', function(event) {
        event.preventDefault(); // evita que a página recarregue
        alert('Cadastro realizado com sucesso!');
        form.reset(); // opcional, limpa os campos do formulário
    });
</script>
</body>
</html>
