        <!-- ================================
             CONTROLES DA BARRA DE PROGRESSO
             Botões para aumentar/diminuir e ligar/desligar a animação.
             ================================ -->
         
          <!-- Ligar/desligar (Animação da barra de progresso) -->
           <h5 class="mt-4">Oferta especial:</h5>

<div class="progress mb-3">
  <div class="progress-bar progress-bar-striped progress-bar-animated"
       id="dynamicProgress"
       role="progressbar"
       style="width: 0%;">
    0%
  </div>
</div>
<div class="text-center">
<button class="btn btn-success" onclick="iniciarProgresso()">
    Ativar oferta
</button>
    </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
let carregando = false;

function iniciarProgresso() {
    if (carregando) return; // evita clicar várias vezes

    carregando = true;

    let progressBar = document.getElementById('dynamicProgress');
    let progresso = 0;

    let intervalo = setInterval(() => {
        progresso++;

        progressBar.style.width = progresso + "%";
        progressBar.textContent = progresso + "%";

        if (progresso >= 100) {
            clearInterval(intervalo);

            setTimeout(() => {
                alert("🎉 Parabéns! Você desbloqueou um desconto especial!");
            }, 300);
        }
    }, 30); // velocidade (quanto menor, mais rápido)
}
</script>
