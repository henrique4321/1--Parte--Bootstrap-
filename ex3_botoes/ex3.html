<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botões Bootstrap</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap ícones -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

</head>
<body>


    <div class="container d-flex justify-content-center mt-3">
        <button class="btn btn-primary">Azul</button>
        <button class="btn btn-danger ms-5">Vermelho</button>
        <button class="btn btn-secondary ms-5">Cinza</button>
        <button class="btn btn-success ms-5">Verde</button>
        <button class="btn btn-warning ms-5">Laranja</button>
        <button class="btn btn-info ms-5">azul claro</button>
    </div>
     
   
     <div class="container d-flex justify-content-center mt-3" >
    <button class="btn btn-primary ms-5">
        <i class="bi bi-search"></i>Pesquisar
    </button>

    <button class="btn btn-success ms-5">
       <i class="bi bi-airplane">Pesquisar</i>
    </button>

    <button class="btn btn-success ms-5">
       <i class="bi bi-emoji-heart-eyes">Pesquisar</i>
    </button>
      </div> 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
