<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

   <div class="container mt-3">
  <div class="row g-3">

    <div class="col-md-4">
      <div class="card h-100">
        <div class="card-body">
          <h5 class="card-title text-center">Chaves</h5>
          <img src="chaves.png" class="img-fluid rounded d-block mx-auto" style="width: 150px" alt="imagem">
          <p class="text-center">Qual serie é melhor?</p>
          <a href="#" class="btn btn-danger d-flex justify-content-center">Votar</a>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card h-100">
        <div class="card-body">
          <h5 class="card-title text-center">Breaking Bad</h5>
          <img src="../ex5_cards/sabrina.png" class="img-fluid rounded d-block mx-auto" style="width: 150px" alt="imagem">
          <p class="text-center">Qual serie é melhor?</p>
          <a href="#" class="btn btn-success d-flex justify-content-center">Votar</a>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card h-100">
        <div class="card-body">
          <h5 class="card-title text-center">Eu a Patroa e As Crianças</h5>
          <img src="eu_a_patroa.png" class="img-fluid rounded d-block mx-auto" style="width: 150px" alt="imagem">
          <p class="text-center">Qual serie é melhor?</p>
          <a href="#" class="btn btn-warning d-flex justify-content-center">Votar</a>
        </div>
      </div>
    </div>

  </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
